services:
  nginx:
    image: nginx:alpine
    container_name: goodgua-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:18081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
    container_name: goodgua-frontend
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    container_name: goodgua-backend
    restart: unless-stopped
    environment:
      - GOODGUA_ENV=production
      - GOODGUA_DATABASE_URL=${GOODGUA_DATABASE_URL}
      - GOODGUA_JWT_SECRET=${GOODGUA_JWT_SECRET}
      - GOODGUA_CORS_ORIGINS=${GOODGUA_CORS_ORIGINS}
      - GOODGUA_USER_SESSION_SECONDS=${GOODGUA_USER_SESSION_SECONDS:-86400}
      - GOODGUA_ADMIN_SESSION_SECONDS=${GOODGUA_ADMIN_SESSION_SECONDS:-7200}
      - GOODGUA_AI_PROVIDER_BASE_URL=${GOODGUA_AI_PROVIDER_BASE_URL:-https://platform.aimom.net/v1}
      - GOODGUA_AI_PROVIDER_API_KEY=${GOODGUA_AI_PROVIDER_API_KEY}
      - GOODGUA_AUTO_CREATE_TABLES=true
      - GOODGUA_BOOTSTRAP_ADMIN_EMAIL=${GOODGUA_BOOTSTRAP_ADMIN_EMAIL}
      - GOODGUA_BOOTSTRAP_ADMIN_PASSWORD=${GOODGUA_BOOTSTRAP_ADMIN_PASSWORD}
      - GOODGUA_TRUSTED_PROXY_IPS=${GOODGUA_TRUSTED_PROXY_IPS}
      - TZ=Asia/Shanghai
    networks:
      - app-network
      - 1panel-network

networks:
  app-network:
    driver: bridge
  1panel-network:
    external: true
